<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Postfix Log Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
  <script>
  (function() {
    var pref = localStorage.getItem('plv-theme') || 'auto';
    var eff = pref === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      : pref;
    document.documentElement.setAttribute('data-bs-theme', eff);
  })();
  </script>
  <style>
    .stats-card .card-body { padding: .75rem 1rem; }
    .stats-card .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stats-card .stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
    .badge-status { font-size: .75em; font-weight: 600; }
    #log-table td { font-size: .8125rem; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    #log-table td:hover { overflow: visible; white-space: normal; word-break: break-all; }
    #detail-modal .modal-content { border: var(--tblr-border-width) solid var(--tblr-border-color); }
    .detail-field .detail-label { font-size: .6875rem; text-transform: uppercase; letter-spacing: .04em; color: var(--tblr-secondary-color); font-weight: 600; margin-bottom: .15rem; }
    .detail-field .detail-value { font-size: .875rem; word-break: break-all; min-height: 1.3em; }
    .detail-field .detail-value:empty::after { content: '\2014'; color: var(--tblr-secondary-color); opacity: .4; }
    .detail-field { margin-bottom: .75rem; }
    .detail-field:last-child { margin-bottom: 0; }
    .detail-col-header { font-size: .6875rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; padding-bottom: .5rem; margin-bottom: .75rem; border-bottom: 2px solid var(--tblr-border-color); display: flex; align-items: center; gap: .4rem; }
    .detail-cols { display: grid; grid-template-columns: 1fr 1fr; }
    .detail-cols > div { padding: 1rem 1.25rem; }
    .detail-cols > div:first-child { border-right: var(--tblr-border-width) solid var(--tblr-border-color); }
    .log-lines-list { max-height: 400px; overflow-y: auto; margin: 0; padding: 0; list-style: none; }
    .log-lines-list li { padding: .35rem 1rem; font-family: var(--tblr-font-monospace); font-size: .6875rem; line-height: 1.65; border-bottom: var(--tblr-border-width) solid var(--tblr-border-color); white-space: pre-wrap; word-break: break-all; }
    .log-lines-list li:last-child { border-bottom: none; }
    .log-lines-list li:hover { background: var(--tblr-hover-bg); }
    .chart-container { position: relative; height: 260px; }
    .loading-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    [data-bs-theme="light"] .loading-overlay { background: rgba(255,255,255,.95); }
    [data-bs-theme="dark"] .loading-overlay { background: rgba(24,36,51,.95); }
    .loading-overlay.hidden { display: none; }
    .dataTables_wrapper .dataTables_filter input { border: 1px solid var(--tblr-border-color); border-radius: 4px; padding: 0.375rem 0.75rem; background: var(--tblr-bg-surface); color: var(--tblr-body-color); }
    .dataTables_wrapper .dataTables_length select { border: 1px solid var(--tblr-border-color); border-radius: 4px; padding: 0.25rem 0.5rem; background: var(--tblr-bg-surface); color: var(--tblr-body-color); }
    table.dataTable thead th { font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    .theme-icon { display: none; }
    .theme-icon.active { display: inline; }
  </style>
</head>
<body class="page">
  <div class="loading-overlay" id="loading">
    <div class="text-center">
      <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;"></div>
      <div class="h3" id="loading-text">Parsing log files...</div>
      <div class="text-muted" id="loading-detail"></div>
    </div>
  </div>

  <div class="page">
    <header class="navbar navbar-expand-md d-print-none">
      <div class="container-xl">
        <h1 class="navbar-brand d-none-navbar-btn pe-0 pe-md-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
            <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          Postfix Log Viewer
        </h1>
        <div class="navbar-nav flex-row ms-auto align-items-center">
          <span class="nav-link text-muted d-none d-md-inline" id="record-count-nav"></span>

          <!-- Theme toggle -->
          <button class="btn btn-ghost-secondary btn-icon btn-sm ms-2" onclick="cycleTheme()" title="Toggle theme" id="theme-btn">
            <svg class="theme-icon" id="icon-auto" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/>
              <path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/>
              <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg class="theme-icon" id="icon-light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/>
              <path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/>
              <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg class="theme-icon" id="icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
          </button>

          <!-- Refresh -->
          <button class="btn btn-ghost-secondary btn-icon btn-sm ms-1" onclick="refreshAll()" title="Refresh">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
              <path d="M16 16h5v5"/>
            </svg>
          </button>

          <!-- Logout -->
          <a href="/logout" class="btn btn-ghost-secondary btn-icon btn-sm ms-1" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <div class="page-wrapper">
      <div class="page-body">
        <div class="container-xl">

          <!-- Stats Cards -->
          <div class="row row-deck mb-3">
            <div class="col-6 col-md">
              <div class="card stats-card">
                <div class="card-body">
                  <div class="stat-label text-muted">Total Messages</div>
                  <div class="stat-value" id="stat-total">-</div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md">
              <div class="card stats-card border-start border-3 border-success">
                <div class="card-body">
                  <div class="stat-label text-muted">Sent</div>
                  <div class="stat-value text-success" id="stat-sent">-</div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md">
              <div class="card stats-card border-start border-3 border-danger">
                <div class="card-body">
                  <div class="stat-label text-muted">Rejected</div>
                  <div class="stat-value text-danger" id="stat-rejected">-</div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md">
              <div class="card stats-card border-start border-3 border-warning">
                <div class="card-body">
                  <div class="stat-label text-muted">Bounced</div>
                  <div class="stat-value text-warning" id="stat-bounced">-</div>
                </div>
              </div>
            </div>
            <div class="col-6 col-md">
              <div class="card stats-card border-start border-3 border-info">
                <div class="card-body">
                  <div class="stat-label text-muted">Deferred</div>
                  <div class="stat-value text-info" id="stat-deferred">-</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Charts -->
          <div class="row row-deck mb-3">
            <div class="col-lg-8">
              <div class="card">
                <div class="card-header"><h3 class="card-title">Message Volume</h3></div>
                <div class="card-body">
                  <div class="chart-container"><canvas id="timeline-chart"></canvas></div>
                </div>
              </div>
            </div>
            <div class="col-lg-4">
              <div class="card">
                <div class="card-header"><h3 class="card-title">Status Distribution</h3></div>
                <div class="card-body">
                  <div class="chart-container"><canvas id="status-chart"></canvas></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Top Senders / Recipients -->
          <div class="row row-deck mb-3">
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">Top Senders</h3></div>
                <div class="table-responsive">
                  <table class="table table-vcenter card-table table-sm">
                    <thead><tr><th>Address</th><th class="text-end">Count</th></tr></thead>
                    <tbody id="top-senders"></tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card">
                <div class="card-header"><h3 class="card-title">Top Recipients</h3></div>
                <div class="table-responsive">
                  <table class="table table-vcenter card-table table-sm">
                    <thead><tr><th>Address</th><th class="text-end">Count</th></tr></thead>
                    <tbody id="top-recipients"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          <!-- Main Log Table -->
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Mail Log</h3>
              <div class="card-actions d-flex align-items-center gap-2">
                <button class="btn btn-ghost-primary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#adv-search" aria-expanded="false" id="adv-toggle">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                  </svg>
                  Filters
                  <span class="badge bg-primary ms-1 d-none" id="filter-count"></span>
                </button>
                <label class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="auto-refresh">
                  <span class="form-check-label">Auto-refresh</span>
                </label>
              </div>
            </div>

            <!-- Advanced Search Panel -->
            <div class="collapse" id="adv-search">
              <div class="card-body border-bottom py-3">
                <div class="row g-2">
                  <div class="col-md-4 col-lg-3">
                    <label class="form-label small mb-1">From</label>
                    <input type="text" class="form-control form-control-sm adv-filter" id="f-from" placeholder="sender address">
                  </div>
                  <div class="col-md-4 col-lg-3">
                    <label class="form-label small mb-1">To</label>
                    <input type="text" class="form-control form-control-sm adv-filter" id="f-to" placeholder="recipient address">
                  </div>
                  <div class="col-md-4 col-lg-3">
                    <label class="form-label small mb-1">Client</label>
                    <input type="text" class="form-control form-control-sm adv-filter" id="f-client" placeholder="hostname or IP">
                  </div>
                  <div class="col-md-4 col-lg-3">
                    <label class="form-label small mb-1">Relay</label>
                    <input type="text" class="form-control form-control-sm adv-filter" id="f-relay" placeholder="hostname or IP">
                  </div>
                  <div class="col-md-4 col-lg-3">
                    <label class="form-label small mb-1">Queue ID</label>
                    <input type="text" class="form-control form-control-sm adv-filter" id="f-qid" placeholder="e.g. EE49130049B">
                  </div>
                  <div class="col-6 col-md-4 col-lg-2">
                    <label class="form-label small mb-1">Status</label>
                    <select class="form-select form-select-sm adv-filter" id="f-status">
                      <option value="">Any</option>
                      <option value="sent">Sent</option>
                      <option value="reject">Rejected</option>
                      <option value="bounced">Bounced</option>
                      <option value="deferred">Deferred</option>
                    </select>
                  </div>
                  <div class="col-6 col-md-4 col-lg-2">
                    <label class="form-label small mb-1">TLS</label>
                    <select class="form-select form-select-sm adv-filter" id="f-tls">
                      <option value="">Any</option>
                      <option value="yes">Yes</option>
                      <option value="no">No</option>
                    </select>
                  </div>
                  <div class="col-md-4 col-lg-2 d-flex align-items-end gap-1">
                    <button class="btn btn-primary btn-sm w-100" onclick="applyFilters()">Apply</button>
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="clearFilters()">Clear</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="table-responsive">
              <table id="log-table" class="table table-vcenter table-striped table-hover card-table" style="width:100%">
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Queue ID</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Size</th>
                    <th>Status</th>
                    <th>Relay</th>
                    <th>Client</th>
                  </tr>
                </thead>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal modal-blur fade" id="detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title" id="detail-title"></h5>
            <div class="text-secondary small" id="detail-subtitle"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <!-- Hero: Message ID -->
          <div class="px-3 py-3 border-bottom" id="detail-hero"></div>
          <!-- Subject (if present) -->
          <div class="px-3 py-2 border-bottom d-none" id="detail-subject-row"></div>
          <!-- Two columns: Sender / Recipient -->
          <div class="detail-cols border-bottom" id="detail-cols"></div>
          <!-- Log lines header -->
          <div class="px-3 py-2 border-bottom">
            <div class="detail-col-header mb-0 border-bottom-0 pb-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/>
                <line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/>
              </svg>
              Related Log Lines <span class="text-secondary fw-normal" id="detail-line-count"></span>
            </div>
          </div>
          <!-- Log lines list -->
          <ul class="log-lines-list" id="detail-lines"></ul>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    var timelineChart, statusChart, dataTable;
    var statusColors = {
      sent:     { badge: 'bg-success text-success-fg' },
      reject:   { badge: 'bg-danger text-danger-fg' },
      bounced:  { badge: 'bg-warning text-warning-fg' },
      deferred: { badge: 'bg-info text-info-fg' },
      other:    { badge: 'bg-secondary text-secondary-fg' }
    };

    // ── Theme ────────────────────────────────────────────────────
    function getThemePref() { return localStorage.getItem('plv-theme') || 'auto'; }
    function effectiveTheme(pref) {
      if (pref === 'auto') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      return pref;
    }
    function applyTheme(pref) {
      var eff = effectiveTheme(pref);
      document.documentElement.setAttribute('data-bs-theme', eff);
      document.querySelectorAll('.theme-icon').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('icon-' + pref).classList.add('active');
      document.getElementById('theme-btn').title = 'Theme: ' + pref;
      updateChartTheme(eff);
    }
    function cycleTheme() {
      var modes = ['auto', 'light', 'dark'];
      var cur = getThemePref();
      var next = modes[(modes.indexOf(cur) + 1) % modes.length];
      localStorage.setItem('plv-theme', next);
      applyTheme(next);
    }
    function updateChartTheme(eff) {
      var isDark = eff === 'dark';
      var txt = isDark ? '#a8aeb7' : '#667382';
      var grid = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
      if (timelineChart) {
        timelineChart.options.scales.x.ticks.color = txt;
        timelineChart.options.scales.y.ticks.color = txt;
        timelineChart.options.scales.y.grid.color = grid;
        timelineChart.update('none');
      }
      if (statusChart) {
        statusChart.options.plugins.legend.labels.color = txt;
        statusChart.update('none');
      }
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      if (getThemePref() === 'auto') applyTheme('auto');
    });

    // ── Settings persistence ─────────────────────────────────────
    function loadSetting(key, fallback) {
      var v = localStorage.getItem('plv-' + key);
      return v !== null ? v : fallback;
    }
    function saveSetting(key, val) { localStorage.setItem('plv-' + key, val); }

    // ── Helpers ──────────────────────────────────────────────────
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function utcToLocal(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      var pad = function(n) { return n < 10 ? '0' + n : n; };
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' +
             pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    // ── DataTable ────────────────────────────────────────────────
    function initTable() {
      var savedLen = parseInt(loadSetting('page-length', '50')) || 50;
      dataTable = $('#log-table').DataTable({
        processing: true,
        serverSide: true,
        ajax: { url: '/api/records', data: function(d) {
          d.f_from   = $('#f-from').val();
          d.f_to     = $('#f-to').val();
          d.f_client = $('#f-client').val();
          d.f_relay  = $('#f-relay').val();
          d.f_qid    = $('#f-qid').val();
          d.f_status = $('#f-status').val();
          d.f_tls    = $('#f-tls').val();
        }},
        deferRender: true,
        order: [[0, 'desc']],
        pageLength: savedLen,
        lengthMenu: [25, 50, 100, 250],
        columns: [
          { data: 0, title: 'Time', width: '150px',
            render: function(d) { return d ? '<span class="text-nowrap">'+esc(utcToLocal(d))+'</span>' : ''; }
          },
          { data: 1, title: 'Queue ID', width: '100px',
            render: function(d) { return '<code class="text-muted">'+esc(d)+'</code>'; }
          },
          { data: 2, title: 'From',
            render: function(d) { return '<span title="'+esc(d)+'">'+esc(d)+'</span>'; }
          },
          { data: 3, title: 'To',
            render: function(d) { return '<span title="'+esc(d)+'">'+esc(d)+'</span>'; }
          },
          { data: 4, title: 'Size', width: '70px', className: 'text-end' },
          {
            data: 5, title: 'Status', width: '100px',
            render: function(data, type, row) {
              if (!data) return '';
              var key = data.toLowerCase();
              var colors = statusColors[key] || statusColors.other;
              var tip = row[6] ? ' title="'+esc(row[6])+'"' : '';
              return '<span class="badge badge-status '+colors.badge+'"'+tip+'>'+esc(data)+'</span>';
            }
          },
          { data: 7, title: 'Relay',
            render: function(d) { return '<span title="'+esc(d)+'">'+esc(d)+'</span>'; }
          },
          { data: 8, title: 'Client',
            render: function(d) { return '<span title="'+esc(d)+'">'+esc(d)+'</span>'; }
          }
        ],
        language: {
          processing: '<div class="spinner-border spinner-border-sm text-primary"></div> Loading...',
          emptyTable: 'No log entries found',
          info: 'Showing _START_ to _END_ of _TOTAL_ entries',
          search: '',
          searchPlaceholder: 'Search logs...',
          lengthMenu: '_MENU_ per page'
        },
        dom: "<'row align-items-center'<'col-auto'l><'col'f>>" +
             "<'row'<'col-12't>>" +
             "<'row align-items-center mt-2'<'col-md-5'i><'col-md-7'p>>"
      });
      dataTable.on('length.dt', function(e, settings, len) { saveSetting('page-length', len); });

      $('#log-table tbody').on('click', 'tr', function() {
        var row = dataTable.row(this).data();
        if (row && row[1]) openDetail(row[1]);
      });

      // Enter key in any filter input triggers apply
      $('.adv-filter').on('keydown', function(e) { if (e.key === 'Enter') applyFilters(); });
    }

    function getActiveFilterCount() {
      var n = 0;
      $('.adv-filter').each(function() { if ($(this).val()) n++; });
      return n;
    }
    function updateFilterBadge() {
      var n = getActiveFilterCount();
      var badge = document.getElementById('filter-count');
      if (n > 0) { badge.textContent = n; badge.classList.remove('d-none'); }
      else { badge.classList.add('d-none'); }
    }
    function applyFilters() {
      updateFilterBadge();
      if (dataTable) dataTable.ajax.reload();
    }
    function clearFilters() {
      $('.adv-filter').val('');
      updateFilterBadge();
      if (dataTable) dataTable.ajax.reload();
    }

    // ── Detail Modal ─────────────────────────────────────────────
    var detailModal;
    function getDetailModal() {
      if (detailModal) return detailModal;
      var el = document.getElementById('detail-modal');
      var BS = window.bootstrap || (tabler && tabler.Modal ? tabler : null);
      if (BS && BS.Modal) {
        detailModal = BS.Modal.getOrCreateInstance(el);
      } else {
        detailModal = { show: function() { $(el).modal('show'); } };
      }
      return detailModal;
    }

    function openDetail(queueId) {
      fetch('/api/detail?qid=' + encodeURIComponent(queueId))
        .then(function(r) { return r.json(); })
        .then(function(d) { renderDetail(d); })
        .catch(function(e) { console.error('detail fetch error:', e); });
    }

    function field(label, value) {
      return '<div class="detail-field"><div class="detail-label">' + esc(label) + '</div>' +
             '<div class="detail-value">' + (value ? esc(value) : '') + '</div></div>';
    }

    function renderDetail(d) {
      var statusKey = (d.status || '').toLowerCase();
      var sc = statusColors[statusKey] || statusColors.other;

      // Header
      document.getElementById('detail-title').innerHTML =
        '<code class="fs-5">' + esc(d.queue_id) + '</code>&ensp;' +
        '<span class="badge ' + sc.badge + ' ms-1">' + esc(d.status) + '</span>';
      document.getElementById('detail-subtitle').textContent =
        utcToLocal(d.timestamp) + (d.status_detail ? '  \u2014  ' + d.status_detail : '');

      // Hero: Message ID
      document.getElementById('detail-hero').innerHTML =
        '<div class="detail-field"><div class="detail-label">Message ID</div>' +
        '<div class="detail-value"><code>' + esc(d.message_id || '') + '</code></div></div>';

      // Subject row (only visible if populated)
      var subjectRow = document.getElementById('detail-subject-row');
      if (d.subject) {
        subjectRow.innerHTML = field('Subject', d.subject);
        subjectRow.classList.remove('d-none');
      } else {
        subjectRow.classList.add('d-none');
      }

      // Two-column layout: Sender (left) | Recipient (right)
      var senderHtml =
        '<div class="detail-col-header">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" ' +
          'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>' +
          '<path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>' +
          'Sender' +
        '</div>' +
        field('From', d.from) +
        field('Client', d.client) +
        field('Size', d.size ? d.size + ' (' + (d.size_bytes || 0).toLocaleString() + ' bytes)' : '');

      var recipientHtml =
        '<div class="detail-col-header">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" ' +
          'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/>' +
          '<path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>' +
          '<path d="m16 19 2 2 4-4"/></svg>' +
          'Recipient' +
        '</div>' +
        field('To', d.to) +
        field('Relay', d.relay) +
        field('TLS', d.tls);

      document.getElementById('detail-cols').innerHTML =
        '<div>' + senderHtml + '</div><div>' + recipientHtml + '</div>';

      // Log lines
      var lines = d.lines || [];
      document.getElementById('detail-line-count').textContent = '(' + lines.length + ')';
      var linesHtml = '';
      lines.forEach(function(l) {
        linesHtml += '<li>' + esc(l.raw) + '</li>';
      });
      document.getElementById('detail-lines').innerHTML =
        linesHtml || '<li class="text-secondary" style="font-family:inherit">No log lines available</li>';

      getDetailModal().show();
    }

    // ── Charts ───────────────────────────────────────────────────
    function initCharts() {
      var isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
      var txt = isDark ? '#a8aeb7' : '#667382';
      var grid = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';

      timelineChart = new Chart(document.getElementById('timeline-chart').getContext('2d'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Messages', data: [], borderColor: '#206bc4', backgroundColor: 'rgba(32,107,196,0.1)', fill: true, tension: 0.3, pointRadius: 2 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 12, font: { size: 11 }, color: txt } },
            y: { beginAtZero: true, grid: { color: grid }, ticks: { font: { size: 11 }, color: txt } }
          }
        }
      });

      statusChart = new Chart(document.getElementById('status-chart').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: ['Sent', 'Rejected', 'Bounced', 'Deferred', 'Other'],
          datasets: [{ data: [0,0,0,0,0], backgroundColor: ['#2fb344','#d63939','#f76707','#4299e1','#667382'], borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '65%',
          plugins: { legend: { position: 'bottom', labels: { padding: 12, font: { size: 12 }, color: txt } } }
        }
      });
    }

    // ── Stats ────────────────────────────────────────────────────
    function loadStats() {
      fetch('/api/stats').then(function(r) { return r.json(); }).then(function(s) {
        document.getElementById('stat-total').textContent = s.total.toLocaleString();
        document.getElementById('stat-sent').textContent = s.sent.toLocaleString();
        document.getElementById('stat-rejected').textContent = s.rejected.toLocaleString();
        document.getElementById('stat-bounced').textContent = s.bounced.toLocaleString();
        document.getElementById('stat-deferred').textContent = s.deferred.toLocaleString();
        document.getElementById('record-count-nav').textContent = s.total.toLocaleString() + ' records';

        statusChart.data.datasets[0].data = [s.sent, s.rejected, s.bounced, s.deferred, s.other];
        statusChart.update();

        if (s.hourly && s.hourly.length) {
          timelineChart.data.labels = s.hourly.map(function(h) {
            var parts = h.hour.split(' ');
            return parts.length > 1 ? parts[0].substring(5) + ' ' + parts[1] + 'h' : h.hour;
          });
          timelineChart.data.datasets[0].data = s.hourly.map(function(h) { return h.count; });
          timelineChart.update();
        }

        var sendersHtml = '';
        (s.top_senders || []).forEach(function(item) {
          sendersHtml += '<tr><td>'+esc(item.name)+'</td><td class="text-end"><strong>'+item.count+'</strong></td></tr>';
        });
        document.getElementById('top-senders').innerHTML = sendersHtml || '<tr><td colspan="2" class="text-muted">No data</td></tr>';

        var recipHtml = '';
        (s.top_recipients || []).forEach(function(item) {
          recipHtml += '<tr><td>'+esc(item.name)+'</td><td class="text-end"><strong>'+item.count+'</strong></td></tr>';
        });
        document.getElementById('top-recipients').innerHTML = recipHtml || '<tr><td colspan="2" class="text-muted">No data</td></tr>';
      });
    }

    function refreshAll() {
      if (dataTable) dataTable.ajax.reload(null, false);
      loadStats();
    }

    // ── Boot ─────────────────────────────────────────────────────
    function checkReady() {
      fetch('/api/status').then(function(r) { return r.json(); }).then(function(s) {
        document.getElementById('loading-detail').textContent = s.status + ' (' + s.records.toLocaleString() + ' records)';
        if (s.ready) {
          document.getElementById('loading').classList.add('hidden');
          initTable();
          initCharts();
          loadStats();
          setInterval(function() {
            if (document.getElementById('auto-refresh').checked) refreshAll();
          }, 30000);
        } else {
          setTimeout(checkReady, 1000);
        }
      }).catch(function() {
        setTimeout(checkReady, 2000);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Restore settings
      applyTheme(getThemePref());
      var ar = loadSetting('auto-refresh', 'true');
      document.getElementById('auto-refresh').checked = ar === 'true';
      document.getElementById('auto-refresh').addEventListener('change', function() {
        saveSetting('auto-refresh', this.checked);
      });

      checkReady();
    });
  </script>
</body>
</html>
